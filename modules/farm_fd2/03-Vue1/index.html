<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Shopping List App</title>
    <link
      rel="stylesheet"
      href="main.css"
    />
  </head>
  <body>
    <div id="shopping-list">
      <h1>{{header || 'Welcome'}}</h1>
      <ul>
        <li
          v-for="item in items"
          :key="item.id"
        >
          {{item.quantity}} {{item.label}}
        </li>
      </ul>
    </div>
    <select
      name="actions"
      id="actions"
    >
      <option v-for="action in actions">{{action.label}}</option>
    </select>
    <script src="https://unpkg.com/vue@3"></script>

    <script>
      const shoppingList = Vue.createApp({
        data() {
          return {
            header: 'Shopping List App',

            items: [
              { id: 1, quantity: '10', label: 'party hats' },
              { id: 2, quantity: '2', label: 'board games' },
              { id: 3, quantity: '25', label: 'cups' },
            ],

            actions: [
              { label: 'Increase' },
              { label: 'Decrease' },
              { label: 'Delete' },
            ],
          };
        },
      }).mount('#shopping-list');
    </script>
  </body>
</html>
