<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Shopping List App</title>
    <link
      rel="stylesheet"
      href="main.css"
    />
  </head>
  <body>
    <div id="shopping-list">
      <div class="header">
        <h1>{{header || 'Welcome'}}</h1>
        <button
          v-if="editing"
          v-on:click="doEdit(false)"
          class="btn btn-cancel"
        >
          Cancel
        </button>
        <button
          v-else
          v-on:click="doEdit(true)"
          class="btn btn-primary"
        >
          Add Item
        </button>
        <button
          v-on:click="populateList"
          class="btn btn-primary"
        >
          Populate
        </button>
      </div>
      <div
        v-if="editing"
        class="add-item-form"
      >
        <input
          v-on:keyup.enter="saveItem"
          v-model="newItem"
          type="text"
          placeholder="Add an item"
        />
        <label>
          <input
            type="checkbox"
            v-model="newItemHighPriority"
          />
          High Priority
        </label>
        <button
          v-on:click="saveItem"
          class="btn btn-primary"
        >
          Save Item
        </button>
      </div>
      <p v-if="items.length === 0">Nice job! You've bought all your items!</p>
      <ul>
        <li
          v-for="(item, index) in items"
          v-bind:key="item.id"
        >
          {{item.label}}
          <button
            v-on:click="deleteItem(index)"
            class="btn btn-cancel"
          >
            Delete
          </button>
        </li>
      </ul>
    </div>
    <script src="https://unpkg.com/vue@3"></script>
    <script>
      const shoppingListApp = Vue.createApp({
        data() {
          return {
            header: 'Shopping List App',
            editing: false,
            newItem: '',
            newItemHighPriority: false,
            items: [],
          };
        },
        methods: {
          saveItem() {
            this.items.push({ id: this.items.length + 1, label: this.newItem });
            this.newItem = '';
            this.editing = false;
          },
          doEdit(editing) {
            this.editing = editing;
            this.newItem = '';
          },
          populateList() {
            this.items.push({ id: 1, label: '10 party hats' });
            this.items.push({ id: 2, label: '2 board games' });
            this.items.push({ id: 3, label: '20 cups' });
          },
          deleteItem(index) {
            this.items.splice(index, 1);
          },
        },
      }).mount('#shopping-list');
    </script>
  </body>
</html>
