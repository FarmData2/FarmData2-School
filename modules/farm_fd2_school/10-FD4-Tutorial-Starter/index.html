<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>07 FD1 Tutorial</title>
  </head>
  <body>
    <div id="fd1-tutorial">
      <h1>07 FD1 Tutorial</h1>

      <label for="users">Users:</label>
      <select
        id="users"
        v-model="selectedUser"
      >
        <option
          v-for="user in userList"
          v-bind:key="user.id"
          v-bind:value="user"
        >
          {{user.name}}
        </option>
      </select>

      <div
        id="user-posts"
        v-if="selectedUser"
      >
        <p>Posts by {{ selectedUser.name }}:</p>
        <ol>
          <li v-for="post in selectedUserPosts">{{post.title}}</li>
        </ol>
      </div>
    </div>
    <script src="https://unpkg.com/vue@3"></script>
    <script>
      const fd1Tutorial = Vue.createApp({
        data() {
          return {
            userList: [],
            selectedUser: null,
            selectedUserPosts: [],
          };
        },
        methods: {
          async fetchUsers() {
            const usersResponse = await fetch(
              'https://jsonplaceholder.typicode.com/users'
            );
            const users = await usersResponse.json();
            this.userList = users;
          },
        },
        watch: {
          async selectedUser() {
            const endPointURL =
              'https://jsonplaceholder.typicode.com/posts?userId=' +
              this.selectedUser.id;
            const postsResponse = await fetch(endPointURL);
            const posts = await postsResponse.json();
            this.selectedUserPosts = posts;
          },
        },
        async created() {
          await this.fetchUsers();
        },
      }).mount('#fd1-tutorial');
    </script>
  </body>
</html>
