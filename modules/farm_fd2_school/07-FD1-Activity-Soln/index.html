<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>07 FD1 Tutorial</title>
  </head>
  <body>
    <div id="fd1-tutorial">
      <h1>07 FD1 Tutorial</h1>

      <label for="users">Users:</label>
      <select
        id="users"
        v-model="selectedUser"
      >
        <option
          v-for="user in userList"
          v-bind:key="user.id"
          v-bind:value="user"
        >
          {{user.name}}
        </option>
      </select>

      <div
        id="user-posts"
        v-if="selectedUser != ''"
      >
        <p>Posts by {{ selectedUser.name }}:</p>
      </div>
    </div>
    <script src="https://unpkg.com/vue@3"></script>
    <script>
      const fd1Tutorial = Vue.createApp({
        data() {
          return {
            userList: [],
            selectedUser: '',
          };
        },
        methods: {
          async fetchUsers() {
            const usersResponse = await fetch(
              'https://jsonplaceholder.typicode.com/users'
            );
            const users = await usersResponse.json();
            // console.log(users);
            // const user = users[0];
            // console.log('name: ' + user.name);
            // console.log('username: ' + user.username);
            // console.log('zip code: ' + user.address.zipcode);
            // console.log('longitude: ' + user.address.geo.lng);
            // console.log('user 8 name: ' + users[8].name);
            this.userList = users;
          },
        },
        watch: {
          async selectedUser() {
            console.log('User changed to ' + this.selectedUser.name);
            const endPointURL =
              'https://jsonplaceholder.typicode.com/posts?userId=' +
              this.selectedUser.id;
            const postsResponse = await fetch(endPointURL);
            const posts = await postsResponse.json();
            console.log(posts);
          },
        },
        created() {
          this.fetchUsers();
        },
      }).mount('#fd1-tutorial');
    </script>
  </body>
</html>
