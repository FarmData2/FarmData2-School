<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Shopping List App</title>
    <link
      rel="stylesheet"
      href="main.css"
    />
  </head>
  <body>
    <div id="shopping-list">
      <h1>{{header || 'Welcome'}}</h1>

      <form
        class="add-item-form"
        v-on:submit.prevent="items.push({id: items.length + 1, label: newItem})"
      >
        <input
          v-model.trim="newItem"
          type="text"
          placeholder="Add an item"
        />
        <label>
          <input
            type="checkbox"
            v-model="newItemHighPriority"
          />
          High Priority
        </label>
        <button class="btn btn-primary">Save Item</button>
      </form>
      <ul>
        <li
          v-for="item in items"
          v-bind:key="item.id"
        >
          <input
            type="radio"
            name="items"
            v-bind:value="item.id"
            v-model="pickedItemId"
          />
          {{item.label}}
        </li>
      </ul>
      The picked item has id: {{ pickedItemId }}
      <br />
      <button v-on:click="pickedItemId=-1">Clear</button>
    </div>
    <script src="https://unpkg.com/vue@3"></script>
    <script>
      const shoppingListApp = Vue.createApp({
        data() {
          return {
            header: 'Shopping List App',
            newItem: '',
            newItemHighPriority: false,
            pickedItemId: -1,
            items: [
              { id: 1, label: '10 party hats' },
              { id: 2, label: '2 board games' },
              { id: 3, label: '20 cups' },
            ],
          };
        },
      }).mount('#shopping-list');
    </script>
  </body>
</html>
