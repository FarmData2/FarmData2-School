<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Shopping List App</title>
    <link
      rel="stylesheet"
      href="main.css"
    />
  </head>
  <body>
    <div id="shopping-list">
      <h1>{{header || 'Welcome'}}</h1>
      <form
        class="add-item-form"
        @submit.prevent="items.push({id:items.length+1, label: newItem})"
      >
        <input
          type="text"
          placeholder="Add an item"
          v-model.trim="newItem"
        />
        <!-- <select
        name=""
        id=""
        v-model="newItemPriority"
      >
        <option value="low">Low</option>
        <option value="high">High</option>
      </select> -->

        <label
          ><input
            type="checkbox"
            v-model="newItemHighPriority"
          />
          High Priority
        </label>

        <button class="btn btn-primary">Save Item</button>
      </form>

      <!-- <label><input type="radio" v-model="newItemPriority" value="high">High</label> -->

      <!-- <label><input type="checkbox" v-model="iceCreamFlavours" value = 'chocolate'> Chocolate </label>
      <label><input type="checkbox" v-model="iceCreamFlavours" value = 'vanilla'> Vanilla </label>
      <label><input type="checkbox" v-model="iceCreamFlavours" value = 'strawberry'> Strawberry </label> -->
      <ul>
        <li
          v-for="item in items"
          v-bind:key="item.id"
        >
          {{item.label}}
        </li>
      </ul>
    </div>
    <script src="https://unpkg.com/vue@3"></script>
    <script>
      const shoppingListApp = Vue.createApp({
        data() {
          return {
            header: 'Shopping List App',
            newItem: '',
            newItemHighPriority: false,
            items: [
              { id: 1, label: '10 party hats' },
              { id: 2, label: '2 board games' },
              { id: 3, label: '20 cups' },
            ],
          };
        },
      }).mount('#shopping-list');
    </script>
  </body>
</html>
