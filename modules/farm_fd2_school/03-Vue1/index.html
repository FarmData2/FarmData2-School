<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Shopping List App</title>
    <link
      rel="stylesheet"
      href="main.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
  </head>
  <body>
    <div id="shopping-list">
      <h1>{{ header }}</h1>
      <input
        v-model="header"
        placeholder="Change the header text"
      />
    </div>
    <script>
      var app = new Vue({
        el: '#shopping-list',
        data: {
          header: 'My Shopping List',
        },
      });
    </script>
  </body>
</html>
